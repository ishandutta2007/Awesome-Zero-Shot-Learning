<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 400" width="100%" height="100%">
  <defs>
    <!-- Background Gradient -->
    <linearGradient id="bg-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0f172a" />
      <stop offset="50%" stop-color="#1e1b4b" />
      <stop offset="100%" stop-color="#090514" />
    </linearGradient>

    <!-- Accent Gradients -->
    <linearGradient id="accent-glow" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#06b6d4" />
      <stop offset="50%" stop-color="#8b5cf6" />
      <stop offset="100%" stop-color="#ec4899" />
    </linearGradient>

    <linearGradient id="glow-cyan" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#22d3ee" stop-opacity="0.8" />
      <stop offset="100%" stop-color="#0891b2" stop-opacity="0.1" />
    </linearGradient>

    <!-- Glowing Filters -->
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="12" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
    <filter id="soft-glow" x="-10%" y="-10%" width="120%" height="120%">
      <feGaussianBlur stdDeviation="6" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1200" height="400" fill="url(#bg-grad)" />

  <!-- Geometric Abstract Network Shapes (Representing ZSL connections) -->
  <g opacity="0.35">
    <!-- Connecting lines -->
    <line x1="150" y1="100" x2="350" y2="150" stroke="#06b6d4" stroke-width="1.5" stroke-dasharray="5 5" />
    <line x1="350" y1="150" x2="300" y2="300" stroke="#8b5cf6" stroke-width="1.5" />
    <line x1="300" y1="300" x2="150" y2="100" stroke="#ec4899" stroke-width="1.5" />
    <line x1="350" y1="150" x2="500" y2="100" stroke="#06b6d4" stroke-width="1.5" />
    <line x1="500" y1="100" x2="650" y2="250" stroke="#8b5cf6" stroke-width="2" />
    <line x1="650" y1="250" x2="900" y2="150" stroke="#ec4899" stroke-width="1.5" stroke-dasharray="4 4" />
    <line x1="900" y1="150" x2="1050" y2="300" stroke="#06b6d4" stroke-width="1.5" />
    <line x1="1050" y1="300" x2="800" y2="320" stroke="#8b5cf6" stroke-width="1.5" />

    <!-- Nodes -->
    <circle cx="150" cy="100" r="8" fill="#06b6d4" filter="url(#soft-glow)" />
    <circle cx="350" cy="150" r="12" fill="#8b5cf6" filter="url(#soft-glow)" />
    <circle cx="300" cy="300" r="6" fill="#ec4899" />
    <circle cx="500" cy="100" r="10" fill="#06b6d4" />
    <circle cx="650" cy="250" r="15" fill="url(#accent-glow)" filter="url(#soft-glow)" />
    <circle cx="900" cy="150" r="8" fill="#ec4899" filter="url(#soft-glow)" />
    <circle cx="1050" cy="300" r="10" fill="#06b6d4" />
    <circle cx="800" cy="320" r="7" fill="#8b5cf6" />
  </g>

  <!-- Large Glowing Background Orbs -->
  <circle cx="950" cy="100" r="150" fill="#8b5cf6" opacity="0.15" filter="url(#glow)" />
  <circle cx="200" cy="300" r="120" fill="#06b6d4" opacity="0.15" filter="url(#glow)" />

  <!-- Futuristic Corner Borders -->
  <path d="M 30,60 L 30,30 L 60,30" stroke="#06b6d4" stroke-width="3" fill="none" opacity="0.8" />
  <path d="M 1170,60 L 1170,30 L 1140,30" stroke="#ec4899" stroke-width="3" fill="none" opacity="0.8" />
  <path d="M 30,340 L 30,370 L 60,370" stroke="#8b5cf6" stroke-width="3" fill="none" opacity="0.8" />
  <path d="M 1170,340 L 1170,370 L 1140,370" stroke="#06b6d4" stroke-width="3" fill="none" opacity="0.8" />

  <!-- Title & Subtitle -->
  <g transform="translate(600, 200)" text-anchor="middle">
    <!-- Main Glowing Text -->
    <text y="-20" font-family="'Outfit', 'Inter', 'Segoe UI', system-ui, sans-serif" font-weight="900" font-size="56" fill="#ffffff" letter-spacing="4" filter="url(#soft-glow)">
      AWESOME ZERO-SHOT LEARNING
    </text>
    
    <!-- Gradient Text Underlay/Glow effect -->
    <text y="-20" font-family="'Outfit', 'Inter', 'Segoe UI', system-ui, sans-serif" font-weight="900" font-size="56" fill="none" stroke="url(#accent-glow)" stroke-width="2" letter-spacing="4" opacity="0.7">
      AWESOME ZERO-SHOT LEARNING
    </text>

    <!-- Subtext -->
    <text y="35" font-family="'Inter', 'Segoe UI', system-ui, sans-serif" font-weight="500" font-size="20" fill="#94a3b8" letter-spacing="6">
      EVOLUTION • VARIANTS • SEMANTIC SPACES • APPLICATIONS
    </text>

    <!-- Decorative Underline -->
    <rect x="-150" y="55" width="300" height="3" rx="1.5" fill="url(#accent-glow)" />
  </g>

  <!-- Small details / Tech grid lines -->
  <line x1="50" y1="350" x2="1150" y2="350" stroke="#334155" stroke-width="1" opacity="0.5" />
  <line x1="50" y1="50" x2="1150" y2="50" stroke="#334155" stroke-width="1" opacity="0.5" />
  
  <text x="60" y="365" font-family="monospace" font-size="10" fill="#475569" letter-spacing="1">SYS.LOC: [0x7F] // CLASS: UNSEEN</text>
  <text x="1140" y="365" font-family="monospace" font-size="10" fill="#475569" text-anchor="end" letter-spacing="1">STATUS: COMPILING SEMANTIC MAPS</text>
</svg>
